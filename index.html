<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eid-Ul-Adha | Royal Cream Luxury | Malik Tanzilla</title>
    <style>
        /* ----- GLOBAL RESET & VARIABLES (Royal Cream Theme) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevents selection glitches during interactions */
        }

        :root {
            --royal-cream: #FDFBF7;
            --cream-mid: #F2EBE1;
            --cream-dark: #E6DBCC;
            --royal-gold: #D4AF37;
            --dark-gold: #9E8024;
            --champagne: #F5E5C9;
            --espresso: #2A1F1A;
            --mocha: #4A3B32;
            --text-muted: #847568;
            --glass-bg: rgba(253, 251, 247, 0.55);
            --mx: 0px;
            --my: 0px;
            --mouse-x: 50%;
            --mouse-y: 50%;
            
            /* ambient background transition */
            --bg-day: var(--royal-cream);
            --bg-mid: #f9f3e8;
            --bg-night: #1a2a3a;
            --current-bg: var(--bg-day);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden !important;
            position: fixed;
            inset: 0;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
            transition: background-color 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background-color: #000;
        }
        /* main wrapper appears after intro */
        #app-main {
            position: fixed;
            inset: 0;
            opacity: 0;
            transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            pointer-events: none;
        }
        body.main-visible #app-main {
            opacity: 1;
            pointer-events: auto;
        }

        /* KINETIC BACKGROUND + DYNAMIC AMBIENT */
        .bg-dynamic {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: background 1.5s ease;
            background: radial-gradient(circle at 30% 20%, var(--royal-cream) 0%, var(--cream-mid) 70%, var(--cream-dark) 100%);
        }
        body.ambient-sunrise .bg-dynamic {
            background: radial-gradient(circle at 40% 30%, #fdeacb 0%, #f5e0b5 50%, #e2cba4 100%);
        }
        body.ambient-night .bg-dynamic {
            background: radial-gradient(circle at 20% 70%, #0f212e 0%, #1e3a4a 60%, #08141c 100%);
        }
        .bg-texture {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            pointer-events: none;
        }
        .vignette {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 180px rgba(0,0,0,0.12);
            pointer-events: none;
        }

        /* FLOATING LANTERNS (upper corners) */
        .lantern {
            position: absolute;
            width: 80px;
            height: 100px;
            opacity: 0.35;
            filter: blur(1.2px);
            transition: opacity 4s ease;
            pointer-events: none;
            z-index: 2;
            animation: floatLantern 18s infinite alternate ease-in-out;
        }
        @keyframes floatLantern {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            100% { transform: translateY(25px) translateX(12px) rotate(6deg); }
        }
        .lantern svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 12px rgba(212,175,55,0.3));
        }

        /* GOLDEN CURSOR TRAIL SYSTEM */
        .gold-trail-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD966, #D4AF37);
            filter: blur(1px);
            opacity: 0.8;
            animation: fadeTrail 0.8s ease-out forwards;
        }
        @keyframes fadeTrail {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(0.2); opacity: 0; }
        }

        /* CRESCENT MOON INTERACTIVE */
        .moon-interactive {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            cursor: pointer;
            z-index: 20;
            transition: filter 0.3s ease, transform 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        .moon-interactive:hover {
            filter: drop-shadow(0 0 14px var(--royal-gold));
            transform: scale(1.02);
        }
        .moon-interactive:active {
            transform: scale(0.97);
        }

        /* NAME BOX (LUXURY + FLOWER BURST) */
        .name-box-enhanced {
            position: relative;
            padding: 2.5rem 4.8rem;
            margin-bottom: 35px;
            background: linear-gradient(135deg, rgba(253,251,247,0.9) 0%, rgba(245,229,201,0.5) 100%);
            border: 1px solid rgba(212,175,55,0.7);
            box-shadow: 0 30px 50px rgba(42,31,26,0.1), inset 0 0 40px rgba(212,175,55,0.2);
            border-radius: 12px;
            backdrop-filter: blur(18px);
            transition: all 0.4s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .name-box-enhanced::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(212,175,55,0.5);
            border-radius: 8px;
        }
        .flower-burst {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 12px;
        }
        .flower-particle {
            position: absolute;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #FFB347, #FFD966);
            clip-path: path("M12,2 L15,9 L22,9 L16,14 L18,21 L12,17 L6,21 L8,14 L2,9 L9,9 Z");
            opacity: 0;
            animation: bloomFlower 1s ease-out forwards;
        }
        @keyframes bloomFlower {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            40% { opacity: 0.9; transform: scale(1.2) rotate(15deg); }
            100% { transform: scale(1.6) rotate(40deg); opacity: 0; }
        }
        .main-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            background: linear-gradient(120deg, var(--espresso) 0%, var(--dark-gold) 40%, var(--royal-gold) 60%, var(--mocha) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: sweepGold 7s linear infinite;
        }
        @keyframes sweepGold {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* GUEST MESSAGE BOOK (FLOATING CARDS) */
        .guest-book {
            position: fixed;
            bottom: 30px;
            right: 25px;
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            pointer-events: none;
        }
        .msg-card {
            max-width: 280px;
            background: rgba(255,255,245,0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px 12px 40px 12px;
            padding: 12px 20px;
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-style: italic;
            color: var(--espresso);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,200,0.9);
            border-left: 4px solid var(--royal-gold);
            animation: slideUpCard 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            transform-origin: right bottom;
            pointer-events: none;
            opacity: 0;
        }
        @keyframes slideUpCard {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* LUXURY PANEL */
        .luxury-panel {
            position: relative;
            z-index: 15;
            background: var(--glass-bg);
            backdrop-filter: blur(50px);
            border-radius: 32px;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            width: 90%;
            max-width: 560px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1), inset 0 1px 3px rgba(255,255,240,0.8);
            transition: all 0.2s;
        }
        .layer {
            transform: translate(calc(var(--mx) * var(--depth, 0.2)), calc(var(--my) * var(--depth, 0.2)));
            transition: transform 0.08s linear;
        }
        .arabic-title {
            font-family: 'Amiri', serif;
            font-size: clamp(2.8rem, 7vw, 4rem);
            background: linear-gradient(135deg, var(--dark-gold), var(--royal-gold), #FFE4A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle, .date-row, .message {
            letter-spacing: 0.1em;
        }
        /* audio button */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,240,0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid var(--royal-gold);
            z-index: 100;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        /* canvas fx */
        #fx-canvas {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
        }

        /* INTRO STYLES (preserved cinematic) */
        #cinematic-intro {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            transition: opacity 1.8s cubic-bezier(0.4,0,0.2,1);
        }
        /* we include star/moon from previous but simplified */
        .star-bg { position: absolute; background: white; border-radius: 50%; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

<!-- CINEMATIC INTRO (Enhanced) -->
<div id="cinematic-intro">
    <div id="zoom-container" style="position:absolute; inset:0; transition:transform 3s cubic-bezier(0.2,0.9,0.1,1); transform-origin:center center;">
        <div id="hero-star" style="position:absolute; top:50%; left:50%; width:4px; height:4px; background:white; border-radius:50%; transform:translate(-50%,-50%); opacity:0; box-shadow:0 0 12px gold;"></div>
    </div>
</div>

<div id="app-main">
    <div class="bg-dynamic" id="ambient-bg"></div>
    <div class="bg-texture"></div>
    <div class="vignette"></div>
    <canvas id="fx-canvas"></canvas>
    
    <!-- Floating Lanterns (only 4) -->
    <div class="lantern" style="top:5%; left:2%; width:70px; animation-duration: 22s;"><svg viewBox="0 0 100 120"><path fill="#D4AF37" opacity="0.6" d="M50,10 L70,45 L65,90 L35,90 L30,45 Z" /><ellipse cx="50" cy="95" rx="20" ry="6" fill="#9E8024"/><line x1="50" y1="10" x2="50" y2="-8" stroke="#D4AF37" stroke-width="2"/></svg></div>
    <div class="lantern" style="top:12%; right:3%; width:85px; animation-duration: 26s; animation-delay: -3s;"><svg viewBox="0 0 100 120"><path fill="#D4AF37" opacity="0.5" d="M50,10 L70,45 L65,90 L35,90 L30,45 Z" /><ellipse cx="50" cy="95" rx="20" ry="6" fill="#9E8024"/></svg></div>
    <div class="lantern" style="bottom:18%; left:4%; width:65px; animation-duration: 30s; animation-delay: -8s;"><svg viewBox="0 0 100 120"><path fill="#E6C87D" opacity="0.5" d="M50,10 L70,45 L65,90 L35,90 L30,45 Z" /></svg></div>
    <div class="lantern" style="top:40%; right:5%; width:72px; animation-duration: 28s;"><svg viewBox="0 0 100 120"><path fill="#D4AF37" opacity="0.45" d="M50,10 L70,45 L65,90 L35,90 L30,45 Z" /></svg></div>

    <!-- Interactive Crescent Moon -->
    <div class="moon-interactive" id="interactiveMoon">
        <svg viewBox="0 0 100 100"><mask id="cresMask"><rect width="100" height="100" fill="white"/><circle cx="65" cy="35" r="48" fill="black"/></mask><circle cx="50" cy="50" r="46" fill="url(#silverGrad)" mask="url(#cresMask)" filter="drop-shadow(0 0 5px gold)"/><defs><radialGradient id="silverGrad"><stop offset="0%" stop-color="#f5f0e0"/><stop offset="80%" stop-color="#D4AF37"/></radialGradient></defs></svg>
    </div>

    <!-- Guest Book Messages (Floating Cards) -->
    <div class="guest-book" id="guestMessagesContainer"></div>

    <!-- Audio Toggle -->
    <button class="music-btn" id="audio-toggle"><span class="icon">🔊</span><span class="text">Unmute</span></button>

    <!-- Main Luxury Panel -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100%; width: 100%;">
        <div class="luxury-panel" id="presenterCard">
            <div class="layer" style="--depth:0.1;"><h1 class="arabic-title">عيد الأضحى المبارك</h1></div>
            <div class="layer" style="--depth:0.15;"><h2 class="subtitle">EID-UL-ADHA</h2></div>
            <div class="layer" style="--depth:0.2;"><div class="date-row">27 May 2026 <span style="color:var(--royal-gold)">✦</span> ١٠ ذو الحجة ١٤٤٧ هـ</div></div>
            <div class="layer" style="--depth:0.0;">
                <div class="name-box-enhanced" id="nameBox">
                    <div class="flower-burst" id="flowerBurstArea"></div>
                    <h1 class="main-name">MALIK TANZILLA</h1>
                </div>
            </div>
            <div class="layer" style="--depth:0.12;"><p class="message">Wishing you a beautiful day filled with joy, gratitude, and special moments.</p></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CINEMATIC INTRO LOGIC (birds & moon & gold reveal) ----------
        const introDiv = document.getElementById('cinematic-intro');
        const zoomContainer = document.getElementById('zoom-container');
        const heroStar = document.getElementById('hero-star');
        let revealTriggered = false;
        
        // generate background starfield
        for(let i=0;i<160;i++){
            let star = document.createElement('div');
            star.className = 'star-bg';
            let size = Math.random()*2+0.5;
            star.style.width=size+'px'; star.style.height=size+'px';
            star.style.position='absolute';
            star.style.left=Math.random()*100+'%';
            star.style.top=Math.random()*100+'%';
            star.style.opacity=Math.random()*0.6+0.1;
            star.style.backgroundColor='white';
            star.style.borderRadius='50%';
            zoomContainer.appendChild(star);
        }
        setTimeout(()=>{ heroStar.style.opacity='1'; heroStar.style.boxShadow='0 0 12px gold'; },100);
        setTimeout(()=>{ zoomContainer.style.transform='scale(1.6) translate(-2%, -1%)'; },1000);
        setTimeout(()=>{
            document.querySelectorAll('.star-bg').forEach(s=>{ s.style.opacity=Math.min(parseFloat(s.style.opacity)+0.4,0.9); });
        },2000);
        // moon emergence
        let moonSvg = `<div id="cinematicMoon" style="position:absolute; top:55%; left:50%; width:180px; height:180px; transform:translate(-50%,-50%) scale(0.6); opacity:0; transition:all 2s ease;"><svg viewBox="0 0 100 100"><mask id="m2"><rect width="100" height="100" fill="white"/><circle cx="65" cy="35" r="46" fill="black"/></mask><circle cx="50" cy="50" r="44" fill="#e0e5ec" mask="url(#m2)"/><circle cx="45" cy="45" r="8" fill="#ccc" opacity="0.2"/></svg></div>`;
        zoomContainer.insertAdjacentHTML('beforeend', moonSvg);
        setTimeout(()=>{
            let moonDiv = document.getElementById('cinematicMoon');
            if(moonDiv){ moonDiv.style.opacity='1'; moonDiv.style.transform='translate(-50%,-50%) scale(1)'; }
        },3000);
        // birds generation (3 birds, last triggers reveal)
        function createBird(startX, startY, endX, speed, delay, isLast=false){
            let bird = document.createElement('div');
            bird.style.position='absolute';
            bird.style.fontSize='26px';
            bird.style.left=startX+'%'; bird.style.top=startY+'%';
            bird.style.opacity='0'; bird.style.transition='opacity 0.4s';
            bird.innerHTML = '🕊️'; // bird symbol
            bird.style.filter='drop-shadow(0 2px 3px rgba(0,0,0,0.1))';
            zoomContainer.appendChild(bird);
            setTimeout(()=>{ bird.style.opacity='0.9'; let pos=startX; let step = (endX-startX)/(100/(speed*60)); let interval = setInterval(()=>{ pos+=step; bird.style.left=pos+'%'; if(pos>=endX){ clearInterval(interval); bird.style.opacity='0'; if(isLast && !revealTriggered){ triggerReveal(); } } },35); }, delay);
        }
        function triggerReveal(){
            if(revealTriggered) return;
            revealTriggered=true;
            // gold trail & moonlight wash effect
            let trailDiv = document.createElement('div');
            trailDiv.style.position='fixed'; trailDiv.style.inset=0; trailDiv.style.background='radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%)'; trailDiv.style.opacity='0'; trailDiv.style.transition='opacity 0.9s'; trailDiv.style.pointerEvents='none'; trailDiv.style.zIndex='250';
            document.body.appendChild(trailDiv);
            setTimeout(()=>{ trailDiv.style.opacity='1'; },50);
            setTimeout(()=>{ 
                let wash = document.createElement('div');
                wash.style.position='fixed'; wash.style.inset=0; wash.style.background='linear-gradient(to bottom, rgba(212,175,55,0.2), #FDFBF7 90%)'; wash.style.opacity='0'; wash.style.transition='opacity 1.2s'; wash.style.zIndex='251';
                document.body.appendChild(wash);
                setTimeout(()=>{ wash.style.opacity='1'; },30);
                setTimeout(()=>{ 
                    document.body.classList.add('main-visible');
                    introDiv.style.opacity='0';
                    setTimeout(()=>{ introDiv.style.display='none'; },2000);
                }, 900);
            }, 400);
        }
        setTimeout(()=>{
            createBird(-5, 32, 115, 0.65, 200, false);
            createBird(-8, 45, 118, 0.5, 700, false);
            createBird(-3, 52, 122, 0.45, 1300, true);
        },4000);
        setTimeout(()=>{ if(!revealTriggered) triggerReveal(); },8000);
        
        // ---------- MAIN PAGE INTERACTIVITY ----------
        // Golden Cursor Trail
        let trailActive = true;
        document.addEventListener('mousemove', (e) => {
            if(!trailActive) return;
            let particle = document.createElement('div');
            particle.className = 'gold-trail-particle';
            particle.style.left = (e.clientX - 3) + 'px';
            particle.style.top = (e.clientY - 3) + 'px';
            document.body.appendChild(particle);
            setTimeout(()=>{ particle.remove(); }, 800);
            // also tiny stars on move
            if(Math.random()>0.85){
                let starParticle = document.createElement('div');
                starParticle.style.position='fixed';
                starParticle.style.left=(e.clientX-2)+'px'; starParticle.style.top=(e.clientY-2)+'px';
                starParticle.style.width='4px'; starParticle.style.height='4px';
                starParticle.style.background='radial-gradient(circle, #FFE484, #D4AF37)';
                starParticle.style.borderRadius='50%';
                starParticle.style.pointerEvents='none';
                starParticle.style.zIndex='9999';
                starParticle.style.animation='fadeTrail 0.6s forwards';
                document.body.appendChild(starParticle);
                setTimeout(()=>starParticle.remove(), 600);
            }
        });
        // Flower burst upon name box opening (vanishing after)
        const nameBoxDiv = document.getElementById('nameBox');
        const flowerContainer = document.getElementById('flowerBurstArea');
        function burstFlowers(){
            for(let i=0;i<24;i++){
                let fl = document.createElement('div');
                fl.classList.add('flower-particle');
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 100 + 30;
                let left = 50 + Math.cos(angle)*radius;
                let top = 50 + Math.sin(angle)*radius;
                fl.style.left = left+'%';
                fl.style.top = top+'%';
                fl.style.position='absolute';
                fl.style.width='18px'; fl.style.height='18px';
                fl.style.background='radial-gradient(circle, #FADB67, #D4AF37)';
                fl.style.clipPath = 'path("M12,2 L15,9 L22,9 L16,14 L18,21 L12,17 L6,21 L8,14 L2,9 L9,9 Z")';
                fl.style.opacity='0.9';
                flowerContainer.appendChild(fl);
                setTimeout(()=>{ fl.remove(); }, 1000);
            }
        }
        setTimeout(()=>{ burstFlowers(); }, 800);
        nameBoxDiv.addEventListener('click', (e)=>{ if(e.target===nameBoxDiv || nameBoxDiv.contains(e.target)) burstFlowers(); });
        
        // Guest messages appear dynamically (popup cards)
        const messagesList = ["🌙 MAY YOUR PLATE BE ALWAYS FULL OF MUTTON", "✨ Blessed Eid, Malik! Joy and peace", "🕌 Taqabbal Allahu minna wa minkum", "🍖 Eid Mubarak! Keep generosity alive", "🌟 May your sacrifices bring light"];
        let msgIndex=0;
        function addGuestMessage(){
            let container = document.getElementById('guestMessagesContainer');
            let card = document.createElement('div');
            card.className = 'msg-card';
            card.innerText = messagesList[msgIndex % messagesList.length];
            container.appendChild(card);
            setTimeout(()=>{ card.style.opacity='1'; },20);
            setTimeout(()=>{ card.remove(); }, 6000);
            msgIndex++;
        }
        setInterval(addGuestMessage, 13000);
        addGuestMessage(); // initial
        
        // Ambient day/night transition (over 90 secs loop)
        let ambientPhase = 0;
        setInterval(()=>{
            ambientPhase = (ambientPhase+1)%3;
            if(ambientPhase===0) document.body.classList.remove('ambient-sunrise','ambient-night');
            else if(ambientPhase===1) document.body.classList.add('ambient-sunrise');
            else document.body.classList.add('ambient-night');
        }, 70000);
        
        // Interactive Moon: hover glow, click -> scatter stars, long press pulse
        const moonElem = document.getElementById('interactiveMoon');
        moonElem.addEventListener('click', (e)=>{
            e.stopPropagation();
            for(let i=0;i<16;i++){
                let starFly = document.createElement('div');
                starFly.style.position='fixed';
                starFly.style.left = (e.clientX + (Math.random()*60-30))+'px';
                starFly.style.top = (e.clientY + (Math.random()*60-30))+'px';
                starFly.style.width='5px'; starFly.style.height='5px';
                starFly.style.background='#FFD966';
                starFly.style.borderRadius='50%';
                starFly.style.pointerEvents='none';
                starFly.style.zIndex='10000';
                starFly.style.boxShadow='0 0 6px gold';
                starFly.style.animation='fadeTrail 0.5s forwards';
                document.body.appendChild(starFly);
                setTimeout(()=>starFly.remove(),500);
            }
        });
        let pressTimer;
        moonElem.addEventListener('touchstart', (e)=>{ pressTimer = setTimeout(()=>{ moonElem.style.transform='scale(1.1)'; setTimeout(()=>{ moonElem.style.transform=''; },300); },300); });
        moonElem.addEventListener('touchend', ()=>{ clearTimeout(pressTimer); });
        
        // Audio element
        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        audio.loop=true; audio.volume=0.4;
        const audioBtn = document.getElementById('audio-toggle');
        let playing=false;
        audioBtn.addEventListener('click', ()=>{
            if(!playing){ audio.play().then(()=>{ playing=true; audioBtn.innerHTML='<span class="icon">♫</span><span class="text">Playing</span>'; }).catch(e=>console.log); }
            else { audio.pause(); playing=false; audioBtn.innerHTML='<span class="icon">🔊</span><span class="text">Unmute</span>'; }
        });
        
        // Parallax & mouse light coupling
        document.addEventListener('mousemove', (e)=>{
            let x = (e.clientX/window.innerWidth-0.5)*28;
            let y = (e.clientY/window.innerHeight-0.5)*28;
            document.documentElement.style.setProperty('--mx', x+'px');
            document.documentElement.style.setProperty('--my', y+'px');
        });
        
        // canvas dust & sparkles + fireworks
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
        window.addEventListener('resize',resizeCanvas); resizeCanvas();
        let dusts=[], sparkles=[];
        for(let i=0;i<50;i++) dusts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2+0.5, alpha:Math.random()*0.4, vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.1});
        function animateFX(){ if(!ctx) return; ctx.clearRect(0,0,canvas.width,canvas.height); dusts.forEach(d=>{ d.x+=d.vx; d.y+=d.vy; if(d.x<0)d.x=canvas.width; if(d.x>canvas.width)d.x=0; if(d.y<0)d.y=canvas.height; if(d.y>canvas.height)d.y=0; ctx.beginPath(); ctx.arc(d.x,d.y,d.size,0,Math.PI*2); ctx.fillStyle=`rgba(212,175,55,${d.alpha*0.5})`; ctx.fill(); }); requestAnimationFrame(animateFX); }
        animateFX();
    })();
</script>
</body>
</html>
