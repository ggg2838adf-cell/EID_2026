<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid-Ul-Adha Greeting - Malik Tanzilla</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cinzel:wght@600&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

    <style>
        /* === Global Restarts & Locks === */
        :root {
            --mx: 0;
            --my: 0;
            --gold: #D4AF37;
            --gold-light: #FFD700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden; /* Strict scroll lock */
            overscroll-behavior: none;
            touch-action: none;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: white;
            user-select: none;
        }

        /* === Canvas Overlay === */
        #cursorTrail {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }

        /* === PHASE 1: Cinematic Intro === */
        #intro-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1.5s ease;
        }
        #intro-container.fade-out { opacity: 0; pointer-events: none; }

        .sparkle {
            position: absolute; width: 4px; height: 4px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 15px 5px rgba(255,255,255,0.8);
            opacity: 0; transform: scale(0);
            animation: sparkleAnim 1s ease-in-out forwards;
        }
        
        .starfield {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 260px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0; transform: scale(1);
            animation: starFadeZoom 5.8s 1s ease-out forwards;
        }

        .intro-moon-mist {
            position: absolute; opacity: 0;
            animation: moonMistFade 2s 2s ease-out forwards;
        }

        .birds {
            position: absolute; width: 100vw; height: 100vh; pointer-events: none;
        }
        .bird { position: absolute; left: 110vw; opacity: 0; fill: #111; }
        .bird1 { top: 35%; animation: birdFly 1.8s 4s linear forwards; }
        .bird2 { top: 40%; animation: birdFly 2.2s 4.2s linear forwards; transform: scale(0.7); }
        .bird3 { top: 30%; animation: birdFly 1.6s 4.4s linear forwards; transform: scale(0.5); }

        .golden-bloom {
            position: absolute; top: 50%; left: 50%;
            width: 100vmax; height: 100vmax;
            margin-left: -50vmax; margin-top: -50vmax;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #FFD700 30%, transparent 70%);
            opacity: 0; transform: scale(0);
            animation: goldenBloom 1.3s 5.5s ease-in forwards;
        }

        /* Intro Animations */
        @keyframes sparkleAnim { 0% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1.5); } 100% { opacity: 0; transform: scale(0); } }
        @keyframes starFadeZoom { 0% { opacity: 0; transform: scale(1); } 20% { opacity: 1; } 100% { opacity: 1; transform: scale(1.15); } }
        @keyframes moonMistFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes birdFly { 0% { left: 110vw; transform: translateY(0) scale(var(--s, 1)); opacity: 1; } 100% { left: -20vw; transform: translateY(-50px) scale(var(--s, 1)); opacity: 1; } }
        @keyframes goldenBloom { 0% { opacity: 0; transform: scale(0); } 70% { opacity: 1; transform: scale(1.5); } 100% { opacity: 1; transform: scale(3); background: radial-gradient(circle, #fff 0%, #fff 100%); } }

        /* === PHASE 2: Main Stage Environment === */
        #main-stage {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(270deg, #FDFBF7, #D4AF37, #1A2436, #D4AF37, #FDFBF7);
            background-size: 800% 800%;
            animation: dayNightCycle 90s ease-in-out infinite;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }
        @keyframes dayNightCycle { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .lantern-wrapper {
            position: absolute; opacity: 0.4;
            animation: floatLantern 10s ease-in-out infinite alternate;
        }
        .lantern-wrapper:nth-child(1) { top: 15%; left: 8%; transform: scale(0.6); animation-delay: 0s; }
        .lantern-wrapper:nth-child(2) { top: 60%; left: 85%; transform: scale(0.4); animation-delay: -3s; }
        .lantern-wrapper:nth-child(3) { top: 75%; left: 15%; transform: scale(0.7); animation-delay: -7s; }
        @keyframes floatLantern { 0% { margin-top: 0; transform: rotate(-5deg); } 100% { margin-top: -40px; transform: rotate(5deg); } }

        #interactive-moon {
            position: absolute; top: 5%; right: 5%;
            width: 90px; height: 90px; cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
            animation: floatMoon 6s ease-in-out infinite alternate;
            transition: filter 0.3s ease; z-index: 20;
        }
        #interactive-moon:hover { filter: drop-shadow(0 0 35px rgba(212, 175, 55, 1)); }
        @keyframes floatMoon { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }

        #guest-messages {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 5;
        }
        .guest-card {
            position: absolute; bottom: -100px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 25px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem;
            color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            animation: floatUp 15s linear forwards;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }

        /* === PHASE 3: Centerpiece === */
        .centerpiece {
            position: relative; z-index: 10;
            background: rgba(20, 20, 20, 0.25);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px; padding: 50px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.15), 0 25px 50px rgba(0,0,0,0.3);
            /* Parallax Effect */
            transform: perspective(1000px) rotateX(calc(var(--my) * -12deg)) rotateY(calc(var(--mx) * 12deg));
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        .centerpiece > * { transform: translateZ(40px); }

        .arabic-text {
            font-family: 'Amiri', serif; font-size: 4.5rem; font-weight: 700;
            background: linear-gradient(90deg, #D4AF37 0%, #FFF5E1 50%, #D4AF37 100%);
            background-size: 200% auto;
            color: transparent; -webkit-background-clip: text; background-clip: text;
            animation: goldShine 4s linear infinite; margin-bottom: -10px;
        }
        @keyframes goldShine { to { background-position: 200% center; } }

        .subtitle {
            font-family: 'Montserrat', sans-serif; letter-spacing: 8px;
            font-size: 1.1rem; color: #E0E0E0; margin-bottom: 30px;
        }

        .name-box {
            font-family: 'Cinzel', serif; position: relative;
            border: 2px solid var(--gold); padding: 15px 40px;
            font-size: 2.5rem; font-weight: 600; color: #FFF;
            display: inline-block; background: rgba(212, 175, 55, 0.1);
        }

        .floral-corner {
            position: absolute; width: 45px; height: 45px; opacity: 0;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }
        .tl { top: -20px; left: -20px; transform: scale(0) rotate(-90deg); }
        .tr { top: -20px; right: -20px; transform: scale(0) rotate(0deg); }
        .bl { bottom: -20px; left: -20px; transform: scale(0) rotate(-180deg); }
        .br { bottom: -20px; right: -20px; transform: scale(0) rotate(90deg); }

        .name-box.bloom .floral-corner { opacity: 1; }
        .name-box.bloom .tl { transform: scale(1) rotate(0deg); }
        .name-box.bloom .tr { transform: scale(1) rotate(90deg); }
        .name-box.bloom .bl { transform: scale(1) rotate(-90deg); }
        .name-box.bloom .br { transform: scale(1) rotate(180deg); }

        .name-box.bloom-out .floral-corner { opacity: 0; transform: scale(0.5) rotate(45deg); transition: all 1s ease-in; }

        .bottom-message {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.3rem; color: #E5E5E5; margin-top: 35px;
            max-width: 450px; line-height: 1.6;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .centerpiece { padding: 30px 20px; transform: none !important; width: 90%; }
            .arabic-text { font-size: 3.2rem; }
            .name-box { font-size: 1.8rem; padding: 10px 20px; }
            .subtitle { font-size: 0.9rem; letter-spacing: 4px; }
            .bottom-message { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="cursorTrail"></canvas>

    <div id="intro-container">
        <div class="starfield"></div>
        <div class="intro-moon-mist">
            <svg viewBox="0 0 100 100" width="150" height="150">
                <defs>
                    <radialGradient id="mist" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="50" fill="url(#mist)"/>
                <path d="M 50 15 A 35 35 0 1 0 85 50 A 25 25 0 1 1 50 15 Z" fill="#FFF"/>
            </svg>
        </div>
        <div class="birds">
            <svg class="bird bird1" viewBox="0 0 50 50" width="60" height="60"><path d="M 0,20 Q 15,5 25,20 Q 35,5 50,20 Q 40,15 25,25 Q 10,15 0,20 Z" fill="#050505"/></svg>
            <svg class="bird bird2" viewBox="0 0 50 50" width="60" height="60"><path d="M 0,20 Q 15,5 25,20 Q 35,5 50,20 Q 40,15 25,25 Q 10,15 0,20 Z" fill="#050505"/></svg>
            <svg class="bird bird3" viewBox="0 0 50 50" width="60" height="60"><path d="M 0,20 Q 15,5 25,20 Q 35,5 50,20 Q 40,15 25,25 Q 10,15 0,20 Z" fill="#050505"/></svg>
        </div>
        <div class="sparkle"></div>
        <div class="golden-bloom"></div>
    </div>

    <div id="main-stage">
        
        <div class="lantern-wrapper">
            <svg viewBox="0 0 100 150" width="60" height="90">
                <circle cx="50" cy="15" r="10" stroke="#D4AF37" stroke-width="4" fill="none"/>
                <path d="M 30 30 Q 50 15 70 30 L 85 45 L 15 45 Z" fill="#D4AF37"/>
                <polygon points="25,45 75,45 65,115 35,115" fill="rgba(212, 175, 55, 0.15)" stroke="#D4AF37" stroke-width="3"/>
                <circle cx="50" cy="85" r="18" fill="#FFD700" filter="blur(6px)"/>
                <polygon points="35,115 65,115 75,125 25,125" fill="#D4AF37"/>
            </svg>
        </div>
        <div class="lantern-wrapper">
            <svg viewBox="0 0 100 150" width="60" height="90">
                <circle cx="50" cy="15" r="10" stroke="#D4AF37" stroke-width="4" fill="none"/>
                <path d="M 30 30 Q 50 15 70 30 L 85 45 L 15 45 Z" fill="#D4AF37"/>
                <polygon points="25,45 75,45 65,115 35,115" fill="rgba(212, 175, 55, 0.15)" stroke="#D4AF37" stroke-width="3"/>
                <circle cx="50" cy="85" r="18" fill="#FFD700" filter="blur(6px)"/>
                <polygon points="35,115 65,115 75,125 25,125" fill="#D4AF37"/>
            </svg>
        </div>
        <div class="lantern-wrapper">
            <svg viewBox="0 0 100 150" width="60" height="90">
                <circle cx="50" cy="15" r="10" stroke="#D4AF37" stroke-width="4" fill="none"/>
                <path d="M 30 30 Q 50 15 70 30 L 85 45 L 15 45 Z" fill="#D4AF37"/>
                <polygon points="25,45 75,45 65,115 35,115" fill="rgba(212, 175, 55, 0.15)" stroke="#D4AF37" stroke-width="3"/>
                <circle cx="50" cy="85" r="18" fill="#FFD700" filter="blur(6px)"/>
                <polygon points="35,115 65,115 75,125 25,125" fill="#D4AF37"/>
            </svg>
        </div>

        <svg id="interactive-moon" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#FFF5E1" />
                    <stop offset="100%" stop-color="#D4AF37" />
                </linearGradient>
            </defs>
            <path d="M 60 5 A 45 45 0 1 0 95 40 A 35 35 0 1 1 60 5 Z" fill="url(#moonGrad)"/>
            <circle cx="80" cy="25" r="2.5" fill="#fff" />
            <circle cx="68" cy="12" r="1.5" fill="#fff" />
        </svg>

        <div id="guest-messages"></div>

        <div class="centerpiece">
            <div class="arabic-text">عيد الأضحى المبارك</div>
            <div class="subtitle">EID-UL-ADHA</div>
            
            <div class="name-box">
                <svg class="floral-corner tl" viewBox="0 0 50 50"><path d="M 0 0 Q 30 0 30 30 Q 30 10 50 10 Q 30 10 20 30 Q 20 0 0 0 Z" fill="#D4AF37"/></svg>
                <svg class="floral-corner tr" viewBox="0 0 50 50"><path d="M 0 0 Q 30 0 30 30 Q 30 10 50 10 Q 30 10 20 30 Q 20 0 0 0 Z" fill="#D4AF37"/></svg>
                <svg class="floral-corner bl" viewBox="0 0 50 50"><path d="M 0 0 Q 30 0 30 30 Q 30 10 50 10 Q 30 10 20 30 Q 20 0 0 0 Z" fill="#D4AF37"/></svg>
                <svg class="floral-corner br" viewBox="0 0 50 50"><path d="M 0 0 Q 30 0 30 30 Q 30 10 50 10 Q 30 10 20 30 Q 20 0 0 0 Z" fill="#D4AF37"/></svg>
                
                MALIK TANZILLA
            </div>

            <div class="bottom-message">Wishing you a beautiful day filled with joy, gratitude, and special moments.</div>
        </div>

    </div>

    <script>
        // === Phase 1 Timeline Controller ===
        setTimeout(() => {
            const intro = document.getElementById('intro-container');
            if(intro) {
                intro.classList.add('fade-out');
                // Remove from DOM after fade-out
                setTimeout(() => intro.remove(), 1500); 
            }

            // Trigger floral bloom slightly after reveal
            setTimeout(() => {
                const nameBox = document.querySelector('.name-box');
                nameBox.classList.add('bloom');
                
                // Graceful vanish after a few seconds
                setTimeout(() => {
                    nameBox.classList.remove('bloom');
                    nameBox.classList.add('bloom-out');
                }, 4000);
            }, 1000);
        }, 6800); // Trigger exactly at 6.8s mark


        // === Phase 2 Parallax calculation ===
        function updateParallax(x, y) {
            // Convert to -1 to 1 space
            const normX = (x / window.innerWidth - 0.5) * 2;
            const normY = (y / window.innerHeight - 0.5) * 2;
            document.documentElement.style.setProperty('--mx', normX);
            document.documentElement.style.setProperty('--my', normY);
        }
        document.addEventListener('mousemove', (e) => updateParallax(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) updateParallax(e.touches[0].clientX, e.touches[0].clientY);
        });


        // === Phase 2 Guest Message Book ===
        const wishes = [
            "May your plate be always full of mutton! 🥩",
            "Wishing you a joyous and blessed Eid!",
            "May this Eid bring peace, prosperity, and happiness.",
            "Eid Mubarak! Have a wonderful day with loved ones.",
            "Sending you warm wishes on this special occasion.",
            "May Allah's blessings be with you today and always.",
            "Have a delicious and memorable Eid-Ul-Adha!"
        ];
        function spawnMessage() {
            const container = document.getElementById('guest-messages');
            if(!container) return;
            const el = document.createElement('div');
            el.className = 'guest-card';
            el.innerText = wishes[Math.floor(Math.random() * wishes.length)];
            el.style.left = Math.random() * 70 + 15 + '%'; // Keep within screen bounds
            container.appendChild(el);
            setTimeout(() => el.remove(), 15000); // Cleanup after animation
        }
        setInterval(spawnMessage, 5000);


        // === Canvas Particle System (Cursor Trail & Moon Click) ===
        const canvas = document.getElementById('cursorTrail');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const shapes = ['dot', 'star', 'crescent'];

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y;
                this.vx = vx || (Math.random() - 0.5) * 1.5;
                this.vy = vy || (Math.random() - 0.5) * 1.5;
                this.size = Math.random() * 5 + 2;
                this.life = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.shape = shapes[Math.floor(Math.random() * shapes.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.2;
                this.color = `rgba(255, 215, 0, ${Math.random() * 0.5 + 0.5})`; // Gold hue
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
                this.rotation += this.rotSpeed;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.life, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                
                if (this.shape === 'dot') {
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                } else if (this.shape === 'star') {
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size,
                                   -Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
                        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.size / 2),
                                   -Math.sin((54 + i * 72) * Math.PI / 180) * (this.size / 2));
                    }
                    ctx.closePath();
                } else if (this.shape === 'crescent') {
                    // Draw outer arc then reverse inner arc for crescent shape
                    ctx.arc(0, 0, this.size, Math.PI * 0.2, Math.PI * 1.8, false);
                    ctx.arc(this.size * 0.4, 0, this.size * 0.8, Math.PI * 1.8, Math.PI * 0.2, true);
                    ctx.closePath();
                }
                ctx.fill();
                ctx.restore();
            }
        }

        // Spawn on mouse move
        let lastMouse = { x: -100, y: -100 };
        document.addEventListener('mousemove', (e) => {
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            if (Math.sqrt(dx*dx + dy*dy) > 10) { // Throttle spawning
                particles.push(new Particle(e.clientX, e.clientY));
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });

        // Interactive Moon Burst
        const interactiveMoon = document.getElementById('interactive-moon');
        interactiveMoon.addEventListener('click', () => {
            const rect = interactiveMoon.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for(let i = 0; i < 80; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                particles.push(new Particle(cx, cy, Math.cos(angle)*speed, Math.sin(angle)*speed));
            }
        });

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

    </script>
</body>
</html>
