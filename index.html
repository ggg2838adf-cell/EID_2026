<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak - Malik Tanzilla</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cinzel:wght@600;800;900&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">

    <style>
        /* === Global Optimization & Strict Locks === */
        :root {
            --mx: 0;
            --my: 0;
            --cream-bg: #FFFDF9;
            --cream-dark: #F3EBD9;
            --gold-metallic: linear-gradient(135deg, #B8860B 0%, #E6CA65 50%, #996515 100%);
            --gold-solid: #C5A059;
            --charcoal-gold: #3D3525;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden !important;
            position: fixed;
            overscroll-behavior: none;
            touch-action: none;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: var(--charcoal-gold);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Enforce Phone Frame Boundary */
        .phone-wrapper {
            width: 100%; height: 100%;
            max-width: 480px; margin: 0 auto;
            position: relative; overflow: hidden;
            background: #000;
        }

        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        #fireworksCanvas { z-index: 15; }
        #trailCanvas { z-index: 110; }
        #petalsCanvas { z-index: 80; }

        /* === PHASE 1: Refined Automated Cinematic Intro === */
        #intro-container {
            position: absolute; inset: 0;
            background: #05070B;
            z-index: 2000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ambient subtle background stars */
        .intro-bg-field {
            position: absolute; inset: 0;
            background-image: 
                radial-gradient(1px 1px at 25% 30%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1.5px 1.5px at 75% 20%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 85% 80%, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            animation: fieldFade 1.5s 0.5s ease-in forwards;
        }
        @keyframes fieldFade { to { opacity: 1; } }

        /* 1-2s: Elegant, single tiny premium sparkle star */
        .intro-star {
            position: absolute; top: 40%; left: 50%; width: 6px; height: 6px;
            background: #FFF;
            border-radius: 50%;
            box-shadow: 0 0 12px 3px rgba(255,255,255,0.9);
            opacity: 0; transform: translate(-50%, -50%) scale(0);
            animation: starZoomSequence 3.2s 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes starZoomSequence {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 20px 6px rgba(255,255,255,1); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(120); background: #EBF8FF; box-shadow: none; }
        }

        /* 3s+: Sophisticated crescent moon fading into view gracefully */
        .intro-moon {
            position: absolute; top: 22%; left: 38%; width: 85px; height: 85px;
            fill: url(#introGoldGrad); opacity: 0; transform: translateY(15px);
            filter: drop-shadow(0 0 10px rgba(230, 202, 101, 0.3));
            animation: moonRise 2.8s 2.8s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        @keyframes moonRise {
            0% { opacity: 0; transform: translateY(15px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Loading Typography text decoration */
        .intro-loading-text {
            position: absolute; bottom: 15%;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.5);
            animation: textPulse 1.8s infinite alternate ease-in-out, fadeOutText 1s 5.5s forwards;
        }
        @keyframes textPulse { 0% { opacity: 0.2; } 100% { opacity: 0.7; color: #E6CA65; } }
        @keyframes fadeOutText { to { opacity: 0; transform: translateY(10px); } }

        /* 3.5s+: Backdrop soft blue daylight transition */
        .sky-layer {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, #CDEEFF 0%, #F4FAFF 100%);
            opacity: 0;
            animation: skyFadeIn 1.4s 3.2s cubic-bezier(0.42, 0, 0.58, 1) forwards;
            z-index: -1;
        }
        @keyframes skyFadeIn { to { opacity: 1; } }

        .flock-container { position: absolute; width: 100%; height: 100%; }
        .intro-bird {
            position: absolute; fill: #2D3748; opacity: 0;
            transform: scale(var(--s));
            animation: flockFly var(--d) var(--delay) linear forwards;
        }
        @keyframes flockFly {
            0% { left: 115%; top: var(--top); opacity: 0; }
            15% { opacity: 0.65; }
            85% { opacity: 0.65; }
            100% { left: -25%; top: calc(var(--top) - 50px); opacity: 0; }
        }

        /* Main Reveal Gate Controller */
        #intro-container.reveal-stage {
            opacity: 0; pointer-events: none;
            transition: opacity 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        /* === PHASE 2: Main Stage Room === */
        #main-stage {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #FFFDF9 0%, #F5EFE2 50%, #EFEAD8 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1; padding: 16px;
        }

        /* Interactive Elements - Fixed depth over centerpiece */
        .lantern-wrapper {
            position: absolute; z-index: 90; pointer-events: none;
            filter: drop-shadow(0 10px 15px rgba(184, 134, 11, 0.12));
            animation: swayLantern 5s ease-in-out infinite alternate;
        }
        .lantern-wrapper:nth-child(1) { top: 4%; left: 8%; transform: scale(0.65); animation-delay: 0s; }
        .lantern-wrapper:nth-child(2) { top: 6%; right: 8%; transform: scale(0.65); animation-delay: -1.5s; }
        @keyframes swayLantern {
            0% { transform: scale(0.65) rotate(-3deg); }
            100% { transform: scale(0.65) rotate(3deg); }
        }

        #interactive-moon {
            position: absolute; top: 15%; right: 10%;
            width: 70px; height: 70px; cursor: pointer;
            filter: drop-shadow(0 0 12px rgba(197,160,89,0.35));
            animation: floatMoon 4s ease-in-out infinite alternate;
            z-index: 95;
        }
        @keyframes floatMoon { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

        /* Left and Right Side Tracks for Non-overlapping Transparent Luxury Theme Cards */
        #guest-messages {
            position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 100;
        }
        .guest-card {
            position: absolute; bottom: -120px; width: 145px;
            background: rgba(184, 134, 11, 0.06);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 14px 12px; border-radius: 18px;
            border: 1px solid rgba(197, 160, 89, 0.35);
            font-size: 0.75rem; font-weight: 600; color: #4A3B2C;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.04);
            line-height: 1.4;
            text-align: center;
            animation: sideFloatUp 9.5s linear forwards;
        }
        .card-left { left: 12px; }
        .card-right { right: 12px; }
        @keyframes sideFloatUp {
            0% { transform: translateY(0) scale(0.95); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-115vh) scale(1); opacity: 0; }
        }

        /* === PHASE 3: Luxury Centerpiece (Premium Layering) === */
        .centerpiece {
            position: relative; z-index: 10; width: 100%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px; padding: 35px 18px; text-align: center;
            box-shadow: 0 25px 55px rgba(165, 140, 90, 0.1), inset 0 0 15px rgba(255,255,255,0.4);
            transform: perspective(1000px) rotateX(calc(var(--my) * -5deg)) rotateY(calc(var(--mx) * 5deg));
            transition: transform 0.2s ease-out;
        }

        .arabic-text {
            font-family: 'Amiri', serif; font-size: 2.7rem; font-weight: 700;
            background: var(--gold-metallic); color: transparent;
            -webkit-background-clip: text; background-clip: text;
            margin-bottom: 2px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif; letter-spacing: 6px;
            font-size: 0.8rem; font-weight: 600; color: var(--gold-solid);
            margin-bottom: 20px;
        }

        /* Masterpiece Central Attraction Name Box */
        .name-box-container {
            position: relative; display: inline-block; margin: 18px 0; width: 100%;
        }
        .name-box {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.65rem;
            color: var(--charcoal-gold); padding: 16px 8px;
            background: linear-gradient(180deg, #FFFFFF 0%, #FAFAEC 100%);
            border-top: 3px double var(--gold-solid);
            border-bottom: 3px double var(--gold-solid);
            letter-spacing: 1px; position: relative; z-index: 2;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.12);
        }
        .name-box::before {
            content: ''; position: absolute; inset: 3px;
            border-top: 1px dashed rgba(197, 160, 89, 0.4);
            border-bottom: 1px dashed rgba(197, 160, 89, 0.4);
        }
        
        .floral-corner {
            position: absolute; width: 34px; height: 34px; z-index: 5;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        .tl { top: -14px; left: -4px; transform: scale(0.5) rotate(-30deg); }
        .tr { top: -14px; right: -4px; transform: scale(0.5) rotate(30deg); }
        .bl { bottom: -14px; left: -4px; transform: scale(0.5) rotate(-120deg); }
        .br { bottom: -14px; right: -4px; transform: scale(0.5) rotate(120deg); }

        .name-box-container.bloom .floral-corner { opacity: 1; transform: scale(1) rotate(0deg); }

        /* Calendars Module */
        .date-section {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(197, 160, 89, 0.18);
            border-bottom: 1px solid rgba(197, 160, 89, 0.18);
            padding: 8px 4px; margin: 20px 0 15px 0;
            font-size: 0.75rem; font-weight: 600;
        }
        .date-eg { font-family: 'Montserrat', sans-serif; color: var(--charcoal-gold); letter-spacing: 0.5px; }
        .date-ar { font-family: 'Amiri', serif; color: var(--gold-solid); font-size: 1rem; }

        .bottom-message {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.05rem; color: var(--charcoal-gold); opacity: 0.85;
            line-height: 1.5; padding: 0 6px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Canvas Engines -->
        <canvas id="fireworksCanvas"></canvas>
        <canvas id="petalsCanvas"></canvas>
        <canvas id="trailCanvas"></canvas>

        <!-- AUTOMATED INTRO THEATRE -->
        <div id="intro-container">
            <div class="intro-bg-field"></div>
            <div class="sky-layer"></div>
            <div class="flock-container" id="flock"></div>
            <div class="intro-star"></div>
            <svg class="intro-moon" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="introGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#E6CA65" />
                        <stop offset="100%" stop-color="#996515" />
                    </linearGradient>
                </defs>
                <path d="M 60 15 A 38 38 0 1 0 90 45 A 30 30 0 1 1 60 15 Z"/>
            </svg>
            <div class="intro-loading-text">LOADING FOR MTJ</div>
        </div>

        <!-- ROYAL CREAM MAIN ROOM -->
        <div id="main-stage">
            
            <!-- Hanging Decorative Lanterns -->
            <div class="lantern-wrapper">
                <svg viewBox="0 0 100 150" width="52" height="80">
                    <path d="M 35 35 Q 50 20 65 35 L 75 50 L 25 50 Z" fill="var(--gold-solid)"/>
                    <polygon points="30,50 70,50 62,110 38,110" fill="rgba(255,255,255,0.75)" stroke="var(--gold-solid)" stroke-width="2"/>
                    <circle cx="50" cy="80" r="10" fill="#FFEAA7" filter="blur(3px)"/>
                    <polygon points="38,110 62,110 68,120 32,120" fill="var(--gold-solid)"/>
                    <line x1="50" y1="0" x2="50" y2="25" stroke="var(--gold-solid)" stroke-width="1.5"/>
                </svg>
            </div>
            <div class="lantern-wrapper">
                <svg viewBox="0 0 100 150" width="52" height="80">
                    <path d="M 35 35 Q 50 20 65 35 L 75 50 L 25 50 Z" fill="var(--gold-solid)"/>
                    <polygon points="30,50 70,50 62,110 38,110" fill="rgba(255,255,255,0.75)" stroke="var(--gold-solid)" stroke-width="2"/>
                    <circle cx="50" cy="80" r="10" fill="#FFEAA7" filter="blur(3px)"/>
                    <polygon points="38,110 62,110 68,120 32,120" fill="var(--gold-solid)"/>
                    <line x1="50" y1="0" x2="50" y2="25" stroke="var(--gold-solid)" stroke-width="1.5"/>
                </svg>
            </div>

            <svg id="interactive-moon" viewBox="0 0 100 100">
                <path d="M 60 15 A 38 38 0 1 0 90 45 A 30 30 0 1 1 60 15 Z" fill="url(#introGoldGrad)"/>
            </svg>

            <!-- Segregated Side Streams Base Container -->
            <div id="guest-messages"></div>

            <!-- Main Luxury Centerpiece -->
            <div class="centerpiece">
                <div class="arabic-text">عيد الأضحى المبارك</div>
                <div class="subtitle">EID-UL-ADHA</div>
                
                <div class="name-box-container" id="nameBoxCont">
                    <svg class="floral-corner tl" viewBox="0 0 40 40"><path d="M0,0 Q25,0 25,25 Q15,12 40,10 Q20,18 0,0" fill="var(--gold-solid)"/></svg>
                    <svg class="floral-corner tr" viewBox="0 0 40 40" style="transform: scaleX(-1);"><path d="M0,0 Q25,0 25,25 Q15,12 40,10 Q20,18 0,0" fill="var(--gold-solid)"/></svg>
                    <svg class="floral-corner bl" viewBox="0 0 40 40" style="transform: scaleY(-1);"><path d="M0,0 Q25,0 25,25 Q15,12 40,10 Q20,18 0,0" fill="var(--gold-solid)"/></svg>
                    <svg class="floral-corner br" viewBox="0 0 40 40" style="transform: scale(-1);"><path d="M0,0 Q25,0 25,25 Q15,12 40,10 Q20,18 0,0" fill="var(--gold-solid)"/></svg>
                    
                    <div class="name-box">MALIK TANZILLA</div>
                </div>

                <div class="date-section">
                    <div class="date-eg">27 May 2026</div>
                    <div class="date-ar">١٠ ذو الحجة ١٤٤٧ هـ</div>
                </div>

                <div class="bottom-message">Wishing you a beautiful day filled with joy, gratitude, and special moments.</div>
            </div>

        </div>
    </div>

    <script>
        // === Premium Synthesis Soundscape Engine ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let mainMelodyNode;
        let mainMelodyGain;
        let noteInterval;
        
        function playSustainedAtmosphere() {
            // Smooth Ambient Instrumental Pad for Intro
            const padOsc = audioCtx.createOscillator();
            const padGain = audioCtx.createGain();
            padOsc.type = 'sine';
            padOsc.frequency.setValueAtTime(164.81, audioCtx.currentTime); // E3 comforting frequency
            padGain.gain.setValueAtTime(0, audioCtx.currentTime);
            padGain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 2);
            padOsc.connect(padGain);
            padGain.connect(audioCtx.destination);
            padOsc.start();

            const stringOsc = audioCtx.createOscillator();
            const stringGain = audioCtx.createGain();
            stringOsc.type = 'triangle';
            stringOsc.frequency.setValueAtTime(246.94, audioCtx.currentTime); // B3 perfect fifth harmonic
            stringGain.gain.setValueAtTime(0, audioCtx.currentTime);
            stringGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 4);
            stringOsc.connect(stringGain);
            stringGain.connect(audioCtx.destination);
            stringOsc.start();
        }

        function playMainStageMusic() {
            // Dedicated rich melodic progression for the main stage
            mainMelodyNode = audioCtx.createOscillator();
            mainMelodyGain = audioCtx.createGain();
            
            mainMelodyNode.type = 'sine';
            mainMelodyNode.frequency.setValueAtTime(220.00, audioCtx.currentTime); // A3 Base
            mainMelodyGain.gain.setValueAtTime(0, audioCtx.currentTime);
            mainMelodyGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 1.5); // Warm crossfade transition
            
            mainMelodyNode.connect(mainMelodyGain);
            mainMelodyGain.connect(audioCtx.destination);
            mainMelodyNode.start();

            // Continuous premium harmonic step script
            let steps = [220.00, 261.63, 329.63, 293.66, 392.00, 329.63, 440.00, 392.00]; // Multi-note premium chord loop
            let stepIndex = 0;
            noteInterval = setInterval(() => {
                if(audioCtx && mainMelodyNode) {
                    stepIndex = (stepIndex + 1) % steps.length;
                    mainMelodyNode.frequency.exponentialRampToValueAtTime(steps[stepIndex], audioCtx.currentTime + 0.8);
                }
            }, 2500);
        }

        function playExplosionSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(750, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // === Generate Birds Dynamically ===
        const flock = document.getElementById('flock');
        for(let i=0; i<18; i++) {
            const bird = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            bird.setAttribute("class", "intro-bird");
            bird.setAttribute("viewBox", "0 0 50 50");
            bird.style.setProperty('--top', `${Math.random() * 40 + 15}%`);
            bird.style.setProperty('--delay', `${3.6 + (Math.random() * 1.5)}s`);
            bird.style.setProperty('--d', `${1.6 + Math.random() * 1.2}s`);
            bird.style.setProperty('--s', `${0.35 + Math.random() * 0.45}`);
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M 0,20 Q 15,5 25,20 Q 35,5 50,20 Q 40,15 25,25 Q 10,15 0,20 Z");
            bird.appendChild(path);
            flock.appendChild(bird);
        }

        // === MASTER AUTOMATED TIMELINE TIMING ===
        window.addEventListener('DOMContentLoaded', () => {
            // Auto unlock context hooks across any platform input safely
            const autoUnlock = () => {
                if (audioCtx.state === 'suspended') { audioCtx.resume(); }
                window.removeEventListener('touchstart', autoUnlock);
                window.removeEventListener('click', autoUnlock);
            };
            window.addEventListener('touchstart', autoUnlock, { once: true });
            window.addEventListener('click', autoUnlock, { once: true });
            
            playSustainedAtmosphere();

            // Complete Intro Run to Main Stage Reveal (Exactly 6.8 seconds)
            setTimeout(() => {
                const intro = document.getElementById('intro-container');
                intro.classList.add('reveal-stage');
                
                // Firecrackers, Purple Petals & Main Music Execution
                triggerOpeningFirecrackers();
                startPetalRainEngine();
                playMainStageMusic();

                setTimeout(() => {
                    intro.remove();
                    document.getElementById('nameBoxCont').classList.add('bloom');
                }, 1400);
            }, 6800);
        });

        // === Dynamic 3D Parallax ===
        function handleMove(x, y) {
            const wrap = document.querySelector('.phone-wrapper');
            const rect = wrap.getBoundingClientRect();
            const normX = ((x - rect.left) / rect.width - 0.5) * 2;
            const normY = ((y - rect.top) / rect.height - 0.5) * 2;
            document.documentElement.style.setProperty('--mx', normX);
            document.documentElement.style.setProperty('--my', normY);
        }
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });

        // === Shuffle Stream System for Non-overlapping Non-emoji Unique Cards ===
        const wishes = [
            "May your plate be always full of savory mutton",
            "Eid Mubarak wishing you warmest sweet moments",
            "Barakah abundance and perfect health to you",
            "May your choices and sacrifices be accepted",
            "Beautiful memories with your entire family",
            "Wishing you safety peace and ultimate success",
            "May this seasonal blessing elevate your days",
            "Sending you absolute light and complete joy",
            "May your home be rich with happy laughter",
            "Warmest wishes on this sacred festive day"
        ];
        
        let localWishPool = [...wishes];
        let alternativeSideToggle = true;

        function spawnMessage() {
            const container = document.getElementById('guest-messages');
            if(!container) return;
            
            // Re-fill pool if running out to guarantee ongoing freshness
            if(localWishPool.length === 0) {
                localWishPool = [...wishes];
            }
            
            // Extract a completely random unique choice each tick
            const targetIdx = Math.floor(Math.random() * localWishPool.length);
            const currentWish = localWishPool.splice(targetIdx, 1)[0];

            const el = document.createElement('div');
            el.className = `guest-card ${alternativeSideToggle ? 'card-left' : 'card-right'}`;
            alternativeSideToggle = !alternativeSideToggle; 
            el.innerText = currentWish;
            container.appendChild(el);
            setTimeout(() => el.remove(), 9500);
        }
        
        // Immediate cycle execution
        spawnMessage();
        setInterval(spawnMessage, 4000);

        // === Canvas Configuration Setup ===
        const fwCanvas = document.getElementById('fireworksCanvas');
        const ptCanvas = document.getElementById('petalsCanvas');
        const trCanvas = document.getElementById('trailCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        const ptCtx = ptCanvas.getContext('2d');
        const trCtx = trCanvas.getContext('2d');
        
        let w, h;
        function resizeCanvases() {
            const rect = fwCanvas.parentElement.getBoundingClientRect();
            w = fwCanvas.width = ptCanvas.width = trCanvas.width = rect.width;
            h = fwCanvas.height = ptCanvas.height = trCanvas.height = rect.height;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // === Firecrackers Engine ===
        let fwParticles = [];
        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.02 + 0.015;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.alpha -= this.decay; }
            draw() {
                fwCtx.save(); fwCtx.globalAlpha = this.alpha;
                fwCtx.fillStyle = this.color; fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
                fwCtx.fill(); fwCtx.restore();
            }
        }
        function triggerOpeningFirecrackers() {
            const points = [ {x: w*0.25, y: h*0.3}, {x: w*0.75, y: h*0.25}, {x: w*0.5, y: h*0.4} ];
            const colors = ['#C5A059', '#E6CA65', '#FFFDF9', '#B8860B'];
            points.forEach((p, idx) => {
                setTimeout(() => {
                    playExplosionSound();
                    for(let i=0; i<45; i++) {
                        fwParticles.push(new FireworkParticle(p.x, p.y, colors[Math.floor(Math.random() * colors.length)]));
                    }
                }, idx * 350);
            });
        }

        // === Falling Premium Pure Purple Petals Engine ===
        let petals = [];
        class Petal {
            constructor() {
                this.x = Math.random() * w; this.y = -20;
                this.size = Math.random() * 6 + 5;
                this.speedY = Math.random() * 1.1 + 0.7;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.rotation = Math.random() * Math.PI;
                this.rotSpeed = (Math.random() - 0.5) * 0.025;
                // Luxury Violet / Orchid Purple tones
                this.color = `rgba(${120 + Math.floor(Math.random() * 45)}, 45, ${180 + Math.floor(Math.random() * 50)}, ${0.55 + Math.random() * 0.25})`;
            }
            update() { this.y += this.speedY; this.x += this.speedX; this.rotation += this.rotSpeed; }
            draw() {
                ptCtx.save(); ptCtx.translate(this.x, this.y); ptCtx.rotate(this.rotation);
                ptCtx.fillStyle = this.color;
                ptCtx.beginPath(); 
                ptCtx.ellipse(0, 0, this.size, this.size / 1.6, 0, 0, Math.PI * 2);
                ptCtx.fill(); ptCtx.restore();
            }
        }
        function startPetalRainEngine() {
            setInterval(() => { if(petals.length < 35) petals.push(new Petal()); }, 350);
        }

        // === Premium Cursor Luxury Trail ===
        let luxuryTrail = [];
        class LuxuryTrailParticle {
            constructor(x, y) {
                this.x = x; this.y = y; this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
                this.size = Math.random() * 3 + 1.5;
            }
            update() { this.alpha -= this.decay; }
            draw() {
                trCtx.save(); trCtx.globalAlpha = this.alpha;
                trCtx.fillStyle = "rgba(197, 160, 89, 0.7)"; trCtx.beginPath();
                trCtx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                trCtx.fill(); trCtx.restore();
            }
        }
        function trackMove(cx, cy) {
            const rect = trCanvas.getBoundingClientRect();
            luxuryTrail.push(new LuxuryTrailParticle(cx - rect.left, cy - rect.top));
        }
        window.addEventListener('mousemove', (e) => trackMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) trackMove(e.touches[0].clientX, e.touches[0].clientY); });

        // Moon Tap Burst Interaction
        document.getElementById('interactive-moon').addEventListener('click', (e) => {
            const rect = trCanvas.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            playExplosionSound();
            for(let i=0; i<25; i++) fwParticles.push(new FireworkParticle(mx, my, '#C5A059'));
        });

        // Combined Animation Engine Loop
        function globalAnimationPipeline() {
            fwCtx.clearRect(0, 0, w, h);
            ptCtx.clearRect(0, 0, w, h);
            trCtx.clearRect(0, 0, w, h);

            // Handle Firecrackers
            for (let i = fwParticles.length - 1; i >= 0; i--) {
                fwParticles[i].update(); fwParticles[i].draw();
                if(fwParticles[i].alpha <= 0) fwParticles.splice(i, 1);
            }

            // Handle Purple Petals
            for (let i = petals.length - 1; i >= 0; i--) {
                petals[i].update(); petals[i].draw();
                if(petals[i].y > h + 20) petals.splice(i, 1);
            }

            // Handle Trail Particles
            for (let i = luxuryTrail.length - 1; i >= 0; i--) {
                luxuryTrail[i].update(); luxuryTrail[i].draw();
                if(luxuryTrail[i].alpha <= 0) luxuryTrail.splice(i, 1);
            }

            requestAnimationFrame(globalAnimationPipeline);
        }
        globalAnimationPipeline();
    </script>
</body>
</html>
