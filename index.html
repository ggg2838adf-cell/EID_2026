<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid-Ul-Adha | Royal Cream Luxury</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&family=Montserrat:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

        :root {
            --royal-gold: #D4AF37;
            --dark-gold: #9E8024;
            --espresso: #2A1F1A;
            --mocha: #4A3B32;
            --text-muted: #847568;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --mx: 0px;
            --my: 0px;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        /* --- ABSOLUTE ANTI-SCROLL FORCE --- */
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            overflow: hidden !important; position: fixed; inset: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--espresso);
            -webkit-font-smoothing: antialiased;
            touch-action: none;
            display: flex; justify-content: center; align-items: center;
            background-color: #000;
        }

        /* =========================================================
           CINEMATIC INTRO SEQUENCE (0-6 SECONDS)
           ========================================================= */
        #intro-stage {
            position: absolute; inset: 0; z-index: 9999;
            background: #000; display: flex; justify-content: center; align-items: center;
            overflow: hidden; pointer-events: none;
        }
        
        #intro-camera {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            transform: scale(1);
            animation: cameraZoom 6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* 0-1s: Tiny sparkle */
        .intro-sparkle {
            width: 2px; height: 2px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255,255,255,0.8);
            opacity: 0; animation: sparkleBorn 1s ease-in forwards 0.5s;
        }

        /* 1-2s: Starfield expands */
        .intro-starfield {
            position: absolute; inset: -50%;
            background-image: radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0));
            background-size: 150px 150px; opacity: 0;
            animation: fadeInStars 2s ease-out forwards 1.5s;
        }

        /* 2-4s: Sky turns deep blue, Moon softly emerges with mist */
        #intro-stage::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, #0a1128 0%, #000 100%);
            opacity: 0; animation: skyShift 3s ease-in forwards 2.5s;
        }
        .intro-mist {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(162,185,226,0.1) 0%, transparent 70%);
            opacity: 0; animation: fadeMist 3s ease-out forwards 3s;
        }
        .intro-moon {
            position: absolute; width: 120px; height: 120px;
            opacity: 0; filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            animation: moonEmerge 3s ease-out forwards 3.2s;
        }

        /* 4-5s: Birds crossing */
        .birds-container {
            position: absolute; top: 30%; left: -20%; width: 140%; height: 200px;
        }
        .bird {
            position: absolute; width: 40px; height: auto; opacity: 0;
            fill: #111; filter: drop-shadow(0 5px 5px rgba(255,255,255,0.2));
        }
        .bird-1 { top: 20px; animation: flyAcross 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 4.2s; }
        .bird-2 { top: 60px; width: 30px; animation: flyAcross 4s cubic-bezier(0.4, 0, 0.2, 1) forwards 4.4s; }
        .bird-3 { top: 10px; width: 50px; animation: flyAcross 3.8s cubic-bezier(0.4, 0, 0.2, 1) forwards 4.6s; }

        /* 5.5s Reveal Wash */
        #reveal-wash {
            position: absolute; inset: 0; background: #fff;
            opacity: 0; z-index: 10;
            animation: lightWash 1.5s ease-in forwards 5.8s;
        }

        @keyframes cameraZoom { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        @keyframes sparkleBorn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1.2); } }
        @keyframes fadeInStars { 0% { opacity: 0; } 100% { opacity: 0.6; } }
        @keyframes skyShift { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes fadeMist { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes moonEmerge { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes flyAcross { 0% { left: 0%; opacity: 0; transform: translateY(10px) rotate(5deg); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { left: 100%; opacity: 0; transform: translateY(-20px) rotate(-5deg); } }
        @keyframes lightWash { 0% { opacity: 0; box-shadow: inset 0 0 0px #D4AF37; } 50% { opacity: 1; box-shadow: inset 0 100vh 150px #D4AF37; } 100% { opacity: 0; } }

        /* =========================================================
           MAIN PAGE & DAY/NIGHT TRANSITION
           ========================================================= */
        #main-stage {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            background: linear-gradient(135deg, var(--color-top), var(--color-bot));
            transition: opacity 1.5s ease; z-index: 1;
            /* Day/Night 90s Cycle */
            animation: dayNightCycle 90s ease-in-out infinite alternate;
        }
        #main-stage.visible { opacity: 1; visibility: visible; }

        @keyframes dayNightCycle {
            0%, 15% { /* Early Morning / Cream */
                --color-top: #FDFBF7; --color-bot: #E6DBCC; color: var(--espresso);
            }
            45%, 55% { /* Sunrise / Sunset */
                --color-top: #F5E5C9; --color-bot: #D4AF37; color: var(--espresso);
            }
            85%, 100% { /* Soft Moonlit Blue */
                --color-top: #1A2436; --color-bot: #0D1321; color: #FDFBF7;
            }
        }

        /* --- Interactive Moon --- */
        #interactive-moon {
            position: absolute; top: 8%; right: 8%; width: 80px; height: 80px;
            cursor: pointer; z-index: 5;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
            animation: floatMoon 6s ease-in-out infinite alternate;
        }
        #interactive-moon:hover { filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.8)); transform: scale(1.05); }
        #interactive-moon:active { transform: scale(0.95); }
        @keyframes floatMoon { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }

        /* --- Floating Lanterns --- */
        .lantern {
            position: absolute; width: 45px; opacity: 0.4; z-index: 2;
            animation: driftLantern 25s ease-in-out infinite alternate;
        }
        .lant-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .lant-2 { top: 25%; right: 20%; animation-delay: -5s; width: 35px; }
        .lant-3 { top: 40%; left: 5%; animation-delay: -12s; width: 55px; }
        @keyframes driftLantern {
            0% { transform: translate(0, 0) rotate(-3deg); }
            100% { transform: translate(30px, -40px) rotate(3deg); }
        }

        /* --- Canvas FX --- */
        #fx-canvas { position: absolute; inset: 0; z-index: 4; pointer-events: none; }

        /* --- Luxury Panel & Name Box --- */
        .luxury-panel {
            position: relative; z-index: 10;
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 24px; padding: 4.5rem 3.5rem; text-align: center;
            width: 90%; max-width: 520px;
            box-shadow: 0 40px 80px rgba(0,0,0, 0.1), inset 0 2px 20px rgba(255,255,255,0.4);
            transform: translateY(40px) scale(0.96) translate(calc(var(--mx) * 0.4), calc(var(--my) * 0.4));
            opacity: 0; transition: color 5s ease;
        }
        .luxury-panel.reveal { animation: panelReveal 2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s; }
        @keyframes panelReveal { 100% { opacity: 1; transform: translateY(0) scale(1) translate(calc(var(--mx)*0.4), calc(var(--my)*0.4)); } }

        .arabic-title {
            font-family: 'Amiri', serif; font-size: clamp(3rem, 6vw, 4.5rem); font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(110deg, var(--royal-gold) 0%, #fff 50%, var(--royal-gold) 100%);
            background-size: 200% auto; color: transparent; -webkit-background-clip: text; animation: sweep 8s linear infinite;
        }
        .subtitle { font-size: 0.65rem; letter-spacing: 1.1em; font-weight: 500; margin-bottom: 30px; text-transform: uppercase; }

        /* Name Box & Flowers */
        .name-box-wrapper { position: relative; margin-bottom: 35px; display: inline-block; }
        .name-box {
            position: relative; padding: 2rem 4rem;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(212, 175, 55, 0.6);
            backdrop-filter: blur(10px); border-radius: 8px; z-index: 5;
        }
        .main-name {
            font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 5.5vw, 4.2rem); font-weight: 700;
            letter-spacing: 0.16em; margin: 0; white-space: nowrap; color: inherit; text-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        
        .flower-ornament {
            position: absolute; width: 60px; height: 60px; z-index: 6; pointer-events: none;
            opacity: 0; transform: scale(0) rotate(-45deg);
        }
        .name-box-wrapper.bloom .flower-ornament {
            animation: bloomVanish 6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .flower-tl { top: -25px; left: -25px; }
        .flower-br { bottom: -25px; right: -25px; transform: scale(-1, -1) rotate(-45deg); }
        @keyframes bloomVanish {
            0% { opacity: 0; transform: scale(0) rotate(-45deg); }
            15%, 80% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(45deg); }
        }

        /* --- Guest Message Book (Floating Cards) --- */
        #message-book {
            position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden;
        }
        .guest-card {
            position: absolute; bottom: -100px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(212,175,55,0.3);
            backdrop-filter: blur(8px); border-radius: 12px;
            padding: 15px 25px; font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 0.9rem; color: inherit; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: floatUp 12s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-2deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(2deg); opacity: 0; }
        }
        
        .layer { transform: translate(calc(var(--mx) * var(--depth)), calc(var(--my) * var(--depth))); transition: transform 0.1s linear; }
        @keyframes sweep { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    </style>
</head>
<body>

    <!-- ==========================================
         PHASE 1: CINEMATIC INTRO STAGE
         ========================================== -->
    <div id="intro-stage">
        <div id="intro-camera">
            <div class="intro-starfield"></div>
            <div class="intro-sparkle"></div>
            <div class="intro-mist"></div>
            <svg class="intro-moon" viewBox="0 0 100 100">
                <path d="M70,20 A40,40 0 1,0 80,80 A50,50 0 1,1 70,20 Z" fill="#fff" />
            </svg>
            <div class="birds-container">
                <svg class="bird bird-1" viewBox="0 0 100 100"><path d="M10,50 Q30,20 50,50 Q70,20 90,50 Q70,60 50,50 Q30,60 10,50 Z"/></svg>
                <svg class="bird bird-2" viewBox="0 0 100 100"><path d="M10,50 Q30,20 50,50 Q70,20 90,50 Q70,60 50,50 Q30,60 10,50 Z"/></svg>
                <svg class="bird bird-3" viewBox="0 0 100 100"><path d="M10,50 Q30,20 50,50 Q70,20 90,50 Q70,60 50,50 Q30,60 10,50 Z"/></svg>
            </div>
        </div>
        <div id="reveal-wash"></div>
    </div>

    <!-- ==========================================
         PHASE 2: MAIN STAGE
         ========================================== -->
    <div id="main-stage">
        <!-- Drifting Lanterns -->
        <svg class="lantern lant-1" viewBox="0 0 50 80"><rect x="15" y="10" width="20" height="40" fill="rgba(212,175,55,0.4)" rx="5"/><path d="M10,10 L40,10 L35,5 L15,5 Z" fill="#D4AF37"/><line x1="25" y1="50" x2="25" y2="70" stroke="#D4AF37" stroke-width="2"/><circle cx="25" cy="30" r="5" fill="#FFF" filter="blur(2px)"/></svg>
        <svg class="lantern lant-2" viewBox="0 0 50 80"><rect x="15" y="10" width="20" height="40" fill="rgba(212,175,55,0.4)" rx="5"/><path d="M10,10 L40,10 L35,5 L15,5 Z" fill="#D4AF37"/><line x1="25" y1="50" x2="25" y2="70" stroke="#D4AF37" stroke-width="2"/><circle cx="25" cy="30" r="5" fill="#FFF" filter="blur(2px)"/></svg>
        <svg class="lantern lant-3" viewBox="0 0 50 80"><rect x="15" y="10" width="20" height="40" fill="rgba(212,175,55,0.4)" rx="5"/><path d="M10,10 L40,10 L35,5 L15,5 Z" fill="#D4AF37"/><line x1="25" y1="50" x2="25" y2="70" stroke="#D4AF37" stroke-width="2"/><circle cx="25" cy="30" r="5" fill="#FFF" filter="blur(2px)"/></svg>

        <!-- Interactive Moon -->
        <svg id="interactive-moon" viewBox="0 0 100 100">
            <path d="M65,15 A40,40 0 1,0 85,75 A45,45 0 1,1 65,15 Z" fill="#D4AF37" />
        </svg>

        <!-- Floating Messages Container -->
        <div id="message-book"></div>

        <canvas id="fx-canvas"></canvas>

        <main class="luxury-panel" id="presenter-card">
            <div class="layer" style="--depth: 0.15;">
                <h1 class="arabic-title">عيد الأضحى المبارك</h1>
            </div>
            <div class="layer" style="--depth: 0.25;">
                <h2 class="subtitle">EID-UL-ADHA</h2>
            </div>

            <div class="layer" style="--depth: 0.0;">
                <div class="name-box-wrapper" id="name-box-ctrl">
                    <!-- Blooming Flowers -->
                    <svg class="flower-ornament flower-tl" viewBox="0 0 100 100">
                        <path d="M50,50 Q20,20 50,0 Q80,20 50,50 Q80,80 50,100 Q20,80 50,50 Z M50,50 Q20,80 0,50 Q20,20 50,50 Q80,20 100,50 Q80,80 50,50 Z" fill="rgba(212,175,55,0.6)"/>
                        <circle cx="50" cy="50" r="8" fill="#fff"/>
                    </svg>
                    <svg class="flower-ornament flower-br" viewBox="0 0 100 100">
                        <path d="M50,50 Q20,20 50,0 Q80,20 50,50 Q80,80 50,100 Q20,80 50,50 Z M50,50 Q20,80 0,50 Q20,20 50,50 Q80,20 100,50 Q80,80 50,50 Z" fill="rgba(212,175,55,0.6)"/>
                        <circle cx="50" cy="50" r="8" fill="#fff"/>
                    </svg>
                    
                    <div class="name-box">
                        <h1 class="main-name">MALIK TANZILLA</h1>
                    </div>
                </div>
            </div>
            <div class="layer" style="--depth: 0.2;">
                <p style="font-family:'Playfair Display',serif; font-style:italic; font-size:0.9rem; opacity:0.8;">Wishing you a beautiful day filled with joy, gratitude, and special moments.</p>
            </div>
        </main>
    </div>

    <script>
        // --- TIMELINE CONTROLLER ---
        window.addEventListener("DOMContentLoaded", () => {
            // Intro tear down & main stage reveal based on CSS timing (6.5s)
            setTimeout(() => {
                document.getElementById('intro-stage').remove();
                document.getElementById('main-stage').classList.add('visible');
                document.getElementById('presenter-card').classList.add('reveal');
                
                // Trigger flower bloom slightly after reveal
                setTimeout(() => {
                    document.getElementById('name-box-ctrl').classList.add('bloom');
                }, 800);

                // Start Guest Message Loop
                startMessageBook();
            }, 6800);
        });

        // --- PARALLAX MATRIX ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30; 
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            document.documentElement.style.setProperty('--mx', `${x}px`);
            document.documentElement.style.setProperty('--my', `${y}px`);
        });

        // --- GUEST MESSAGE BOOK (Floating Cards) ---
        const messages = [
            "May your plate be always full of mutton! 🥩",
            "Wishing you endless blessings today! ✨",
            "Eid Mubarak to you and your loved ones! 🌙",
            "May this Eid bring peace and prosperity. 🕊️",
            "Sending love and warm wishes your way! ❤️"
        ];
        
        function startMessageBook() {
            const container = document.getElementById('message-book');
            setInterval(() => {
                const card = document.createElement('div');
                card.className = 'guest-card';
                card.innerText = messages[Math.floor(Math.random() * messages.length)];
                
                // Randomize horizontal starting position (10% to 80% width)
                card.style.left = `${Math.random() * 70 + 10}%`;
                container.appendChild(card);
                
                // Cleanup after animation
                setTimeout(() => card.remove(), 12500);
            }, 5000); // Spawns a new message every 5 seconds
        }

        // --- CANVAS ENGINE: GOLDEN CURSOR TRAIL & FIREWORKS ---
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouse = { x: -100, y: -100 };

        function setBounds() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setBounds);
        setBounds();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            // Spawn cursor trail particles
            for(let i=0; i<2; i++) particles.push(new TrailParticle(mouse.x, mouse.y));
        });

        // Types of particles: 0 = circle, 1 = star, 2 = crescent
        class TrailParticle {
            constructor(x, y, isExplosion = false) {
                this.x = x + (Math.random() - 0.5) * 20;
                this.y = y + (Math.random() - 0.5) * 20;
                this.size = Math.random() * 3 + 1;
                this.vx = (Math.random() - 0.5) * (isExplosion ? 8 : 2);
                this.vy = (Math.random() - 0.5) * (isExplosion ? 8 : 2) + (isExplosion ? 2 : -0.5);
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.type = Math.floor(Math.random() * 3);
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.angle += this.rotSpeed;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = '#D4AF37';
                ctx.shadowBlur = 10; ctx.shadowColor = '#D4AF37';

                if(this.type === 0) { // Dot
                    ctx.beginPath(); ctx.arc(0,0, this.size, 0, Math.PI*2); ctx.fill();
                } else if(this.type === 1) { // Star
                    ctx.beginPath();
                    for(let i=0; i<5; i++){
                        ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*this.size*1.5, -Math.sin((18+i*72)*Math.PI/180)*this.size*1.5);
                        ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*this.size*0.6, -Math.sin((54+i*72)*Math.PI/180)*this.size*0.6);
                    }
                    ctx.closePath(); ctx.fill();
                } else { // Crescent
                    ctx.beginPath(); ctx.arc(0,0, this.size*1.2, 0, Math.PI*2);
                    ctx.fillStyle = '#D4AF37'; ctx.fill();
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath(); ctx.arc(this.size*0.4, -this.size*0.4, this.size*1.2, 0, Math.PI*2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                }
                ctx.restore();
            }
        }

        // Interactive Moon Click Event
        const iMoon = document.getElementById('interactive-moon');
        iMoon.addEventListener('click', (e) => {
            const rect = iMoon.getBoundingClientRect();
            const mx = rect.left + rect.width/2;
            const my = rect.top + rect.height/2;
            // Spawn scatter explosion
            for(let i=0; i<40; i++) particles.push(new TrailParticle(mx, my, true));
        });

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            for(let i = particles.length-1; i>=0; i--) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();
    </script>
</body>
</html>
